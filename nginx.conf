server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión básica de los assets de la SPA
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache largo para assets con hash en el nombre (Vite los versiona)
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Fallback SPA: cualquier ruta desconocida sirve index.html
    # (React Router resuelve la navegación en el cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
