name: Build & Push to ECR

# Construye la imagen nginx del front y la sube a Amazon ECR en push a develop.
#
# GitHub Secrets requeridos (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION
#
# GitHub Variables opcionales (Settings → Secrets and variables → Actions → Variables):
#   ECS_CLUSTER (default 'prisma-cluster'), ECS_SERVICE (default 'prisma-app')
#   → ajustalos si tu cluster/service tienen otro nombre.
#
# ⚠️ AWS Academy / Learner Lab: las credenciales son TEMPORALES (~4 h) y cambian
#    cada vez que reinicias el lab. Debés ACTUALIZAR los secrets AWS en cada sesión
#    o el workflow fallará con "ExpiredTokenException".
#
# Nota: el front no necesita build-args. Las URLs de los micros van same-origin
# (nginx de la imagen hace de reverse-proxy, ver nginx.conf.template) y el front
# no usa Supabase client-side (auth vía ms-users).
#
# Tras pushear la imagen, se fuerza un redeploy del service ECS. Como los 6
# contenedores viven en UNA sola task/service, ese único force-new-deployment
# reinicia TODO el stack con sus imágenes :latest más recientes.

on:
  push:
    branches: [aws-deploy]
  workflow_dispatch:

env:
  ECR_REPOSITORY: prisma-front

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Build, tag & push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Force ECS redeploy
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'prisma-cluster' }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE || 'prisma-app' }}
        run: |
          # Un solo service (prisma-app) corre los 6 contenedores → este redeploy
          # los reinicia a todos con sus imágenes :latest recién pusheadas.
          # Si desiredCount=0 (demo apagada) no levanta tasks, pero no falla.
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --no-cli-pager \
            --query 'service.{name:serviceName,desired:desiredCount,running:runningCount}' \
            --output table
